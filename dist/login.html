<script>document.addEventListener("DOMContentLoaded", function() {
    // INPUT
    const emailInput = document.querySelector('input[placeholder="Email"]');
    const passwordInput = document.querySelector('input[placeholder="Password"]');
    // PASSWORD TYPE
    passwordInput.type = "password";
    // LOGIN BUTTON
    const loginButton = document.querySelector('button');
    loginButton.addEventListener("click", function() {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        // VALIDASI
        if (email === "" || password === "") {
            alert("Email dan password harus diisi!");
            return;
        }
        // LOGIN SUCCESS
        alert("Login berhasil!");
        // REDIRECT
        window.location.href = "home-page1.html";
    });
    // SHOW / HIDE PASSWORD
    const eyeButton = document.querySelectorAll("button")[0];
    eyeButton.addEventListener("click", function(e) {
        e.preventDefault();
        if (passwordInput.type === "password") passwordInput.type = "text";
        else passwordInput.type = "password";
    });
    // GOOGLE BUTTON
    const googleBtn = document.querySelectorAll("button")[2];
    googleBtn.addEventListener("click", function() {
        alert("Login Google");
    });
    // FACEBOOK BUTTON
    const facebookBtn = document.querySelectorAll("button")[3];
    facebookBtn.addEventListener("click", function() {
        alert("Login Facebook");
    });
    // APPLE BUTTON
    const appleBtn = document.querySelectorAll("button")[4];
    appleBtn.addEventListener("click", function() {
        alert("Login Apple");
    });
});

</script>
